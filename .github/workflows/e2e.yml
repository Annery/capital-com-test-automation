name: E2E tests

on:
    workflow_dispatch:
        inputs:
            grep:
                description: 'Playwright --grep (e.g. @FCA.*@EN.*@authorized or @FCA.*@authorized)'
                default: '@EN'
                required: false

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - run: npm ci

            - run: npx playwright install --with-deps chromium

            - name: Restore saved sessions
              run: |
                  mkdir -p .auth
                  echo "${{ secrets.AUTHORIZED_STATE_B64 }}" | base64 -d > .auth/authorized.json
                  echo "${{ secrets.UNAUTHORIZED_STATE_B64 }}" | base64 -d > .auth/unauthorized.json

            - name: Run tests
              run: npx playwright test --project=chromium --grep "${{ inputs.grep }}"

            - name: Upload allure-results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: allure-results
                  path: allure-results

            - name: Upload traces (on failure)
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: test-results
                  path: test-results
