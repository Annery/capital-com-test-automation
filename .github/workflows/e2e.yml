name: E2E tests

on:
    workflow_dispatch:
        inputs:
            browser:
                description: 'Browser'
                type: choice
                options: [all, chromium, webkit]
                default: chromium
            spec:
                description: 'Spec / section'
                type: choice
                options: [all, header, about, pricing, trading]
                default: all
            license:
                description: 'License'
                type: choice
                options: [all, FCA, ASIC, CMA, SCB, CYSEC]
                default: all
            language:
                description: 'Language'
                type: choice
                options:
                    [all, EN, DE, FR, AR, RU, ES, IT, NL, PL, RO, HU, EL, MN, VI, ZH_HANS, ZH_HANT]
                default: all
            state:
                description: 'User state'
                type: choice
                options: [all, unregistered, unauthorized, authorized]
                default: all

jobs:
    test:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        concurrency:
            group: allure-publish
            cancel-in-progress: false
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: '17'

            - run: npm ci

            - run: npx playwright install --with-deps chromium webkit

            - name: Restore saved sessions
              run: |
                  mkdir -p .auth
                  echo "${{ secrets.AUTHORIZED_STATE_B64 }}" | base64 -d > .auth/authorized.json
                  echo "${{ secrets.UNAUTHORIZED_STATE_B64 }}" | base64 -d > .auth/unauthorized.json

            - name: Run tests
              run: |
                  case "${{ inputs.spec }}" in
                    header) SPEC="tests/header" ;;
                    about) SPEC="tests/content/about.spec.ts" ;;
                    pricing) SPEC="tests/content/pricing.spec.ts" ;;
                    trading) SPEC="tests/content/trading.spec.ts" ;;
                    *) SPEC="" ;;
                  esac
                  case "${{ inputs.browser }}" in
                    chromium) PROJ="--project=chromium" ;;
                    webkit) PROJ="--project=webkit" ;;
                    *) PROJ="--project=chromium --project=webkit" ;;
                  esac
                  GREP=""
                  [ "${{ inputs.license }}" != "all" ] && GREP="${GREP}(?=.*@${{ inputs.license }})"
                  [ "${{ inputs.language }}" != "all" ] && GREP="${GREP}(?=.*@${{ inputs.language }})"
                  [ "${{ inputs.state }}" != "all" ] && GREP="${GREP}(?=.*@${{ inputs.state }})"
                  if [ -z "$GREP" ]; then
                    npx playwright test $SPEC $PROJ
                  else
                    npx playwright test $SPEC $PROJ --grep "$GREP"
                  fi

            - name: Checkout accumulated results
              if: always()
              uses: actions/checkout@v4
              with:
                  ref: allure-results
                  path: store

            - name: Merge this run into accumulated results
              if: always()
              run: |
                  mkdir -p store/allure-results
                  if [ -d allure-results ]; then cp -r allure-results/. store/allure-results/; fi

            - name: Commit accumulated results
              if: always()
              run: |
                  cd store
                  git config user.name "ci"
                  git config user.email "[email protected]"
                  git add allure-results
                  git commit -m "- Accumulated allure results from run ${{ github.run_id }}" || echo "nothing new"
                  git push

            - name: Restore Allure trend history
              if: always()
              uses: actions/checkout@v4
              with:
                  ref: gh-pages
                  path: gh-pages
              continue-on-error: true

            - name: Generate Allure report from full history
              if: always()
              run: |
                  mkdir -p store/allure-results/history
                  if [ -d gh-pages/history ]; then cp -r gh-pages/history/. store/allure-results/history/; fi
                  npm install -g allure-commandline
                  allure generate store/allure-results --clean -o allure-report

            - name: Deploy report to GitHub Pages
              if: always()
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_branch: gh-pages
                  publish_dir: allure-report

            - name: Upload traces (on failure)
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: test-results
                  path: test-results
